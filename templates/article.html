<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{seoHead}}
    <meta name="description" content="{{description}}" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:type" content="article" />
    <link rel="stylesheet" href="/assets/root.css" />
    <link rel="stylesheet" href="/assets/mainCss.css" />
    <link rel="stylesheet" href="/assets/subpage.css" />
    <link rel="stylesheet" href="/assets/article.css" />
    <script type="module" src="/assets/header.js"></script>
    <title>{{title}}</title>
  </head>
  <body>
    <my-header></my-header>
    <main class="article-page">
      <a href="/" class="page-back">
        <span class="page-back__arrow" aria-hidden="true">←</span>
        返回首页
      </a>
      <div class="article-shell">
        <header class="article-header">
          <h1>{{title}}</h1>
          <div class="article-meta">
            <time datetime="{{dateIso}}">发布 {{dateFormatted}}</time>
            {{updatedBlock}}
            <span
              class="article-views"
              data-category="{{category}}"
              data-slug="{{slug}}"
              >—</span
            >
            <a class="article-category" href="{{categoryArchivePath}}">[ {{category}} ]</a>
          </div>
        </header>
        <div class="article-body">
          {{tocBlock}}
          <div class="article-content">{{content}}</div>
        </div>
        {{articleNavBlock}}
        <section class="article-comments" aria-label="评论">
          <h2 class="article-comments__title">评论</h2>
          <div class="giscus"></div>
        </section>
      </div>
    </main>
    <footer>- End -</footer>
    <script type="module" src="/assets/article-meta.js"></script>
    <script type="module" src="/assets/article-code.js"></script>
    <script type="module" src="/assets/article-mermaid.js"></script>
    <script type="module" src="/assets/article-toc.js"></script>
    <script type="module" src="/assets/article-comments.js"></script>
  </body>
</html>
